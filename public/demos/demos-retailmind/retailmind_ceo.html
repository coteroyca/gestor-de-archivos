<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailMind · CEO · Estados Operacionales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080d1a;
  --bg2:#0d1528;
  --bg3:#111c33;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#e8eeff;
  --muted:#8a96b8;
  --accent:#ff6b35;
  --accent2:#ff8c5a;
  --green:#2ed88a;
  --red:#ff5c5c;
  --yellow:#ffb347;
  --blue:#5b9cf6;
  --purple:#a78bfa;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;font-size:13px}
body.theme-office{
  --bg:#f4f6fb;
  --bg2:#ffffff;
  --bg3:#eef2f8;
  --border:rgba(15,23,42,0.10);
  --border2:rgba(15,23,42,0.18);
  --text:#172033;
  --muted:#64748b;
  --accent:#2563eb;
  --accent2:#3b82f6;
  --green:#16a34a;
  --red:#dc2626;
  --yellow:#d97706;
  --blue:#2563eb;
  --purple:#7c3aed;
}
.shell{display:grid;grid-template-rows:56px 1fr;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:relative;z-index:10}
.topbar img{height:28px}
.topbar-divider{width:1px;height:24px;background:var(--border2);margin:0 0.5rem}
.topbar-date{font-size:11px;color:var(--muted)}
.topbar-badge{background:rgba(255,107,53,0.12);color:var(--accent2);padding:2px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid rgba(255,107,53,0.2);margin-left:auto}
.topbar-user{display:flex;align-items:center;gap:8px;margin-left:1rem}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#a855f7);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto}
.sidebar-section{padding:0.5rem 1rem;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-top:0.5rem}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1rem;cursor:pointer;color:var(--muted);font-size:12px;transition:all 0.15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,107,53,0.06)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:rgba(255,92,92,0.15);color:var(--red);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600}
.nav-badge.green{background:rgba(46,216,138,0.15);color:var(--green)}


.menu-toggle{display:none;width:36px;height:36px;border:1px solid var(--border2);border-radius:10px;background:transparent;color:var(--text);font-size:18px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.menu-toggle:hover{background:rgba(255,255,255,0.05)}
.sidebar-overlay{display:none;position:fixed;inset:56px 0 0 0;background:rgba(0,0,0,0.45);z-index:19;opacity:0;transition:opacity 0.2s ease;pointer-events:none}
.theme-settings{margin:8px 1rem 0;padding:10px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.03);display:none}
.theme-settings.open{display:block}
.theme-settings-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:8px}
.theme-option{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:var(--text);cursor:pointer}
.theme-option input{accent-color:var(--accent)}
@media (max-width: 720px){
  .shell{grid-template-columns:1fr;grid-template-rows:56px 1fr}
  .topbar{padding:0 0.75rem;gap:0.6rem}
  .topbar img{height:22px;max-width:130px;object-fit:contain}
  .topbar-badge,.topbar-user,.topbar-date{display:none}
  .menu-toggle{display:flex}
  .sidebar{position:fixed;top:56px;bottom:0;left:0;width:260px;z-index:20;transform:translateX(-105%);transition:transform 0.22s ease;box-shadow:18px 0 40px rgba(0,0,0,0.35)}
  body.mobile-menu-open .sidebar{transform:translateX(0)}
  body.mobile-menu-open .sidebar-overlay{display:block;opacity:1;pointer-events:auto}
  .main{grid-column:1;padding:1rem;gap:1rem}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .state-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .drill-tabs{overflow-x:auto;width:100%;padding-bottom:2px}
}

/* MAIN */
.main{overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.breadcrumb span{cursor:pointer;transition:color 0.15s}
.breadcrumb span:hover{color:var(--text)}
.breadcrumb .active-crumb{color:var(--text);font-weight:500}
.breadcrumb .sep{color:var(--border2)}

/* DRILL TABS */
.drill-tabs{display:flex;gap:6px}
.drill-tab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);color:var(--muted);background:transparent}
.drill-tab:hover{color:var(--text);border-color:var(--border2)}
.drill-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem}
.kpi-label{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
.kpi-value{font-size:22px;font-weight:700;margin:4px 0 2px;letter-spacing:-0.5px}
.kpi-delta{font-size:11px;font-weight:500}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--yellow)}

/* STATE GRID */
.state-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.state-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.2rem;cursor:pointer;transition:all 0.2s}
.state-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.state-card.selected{border-color:var(--accent);background:rgba(255,107,53,0.05)}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sc-domain{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase}
.sc-status{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600}
.s-green{background:rgba(46,216,138,0.12);color:var(--green)}
.s-red{background:rgba(255,92,92,0.12);color:var(--red)}
.s-yellow{background:rgba(255,179,71,0.12);color:var(--yellow)}
.s-blue{background:rgba(91,156,246,0.12);color:var(--blue)}
.s-purple{background:rgba(167,139,250,0.12);color:var(--purple)}
.sc-state{font-size:15px;font-weight:700;margin-bottom:6px}
.sc-row{display:flex;justify-content:space-between;align-items:center;margin:3px 0;font-size:11px;color:var(--muted)}
.sc-row strong{color:var(--text);font-weight:500}
.sc-conf{font-size:10px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
.conf-bar{height:4px;border-radius:2px;background:var(--border2);overflow:hidden;flex:1;margin:0 8px;align-self:center}
.conf-fill{height:100%;border-radius:2px}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.2rem}
.panel-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px}

/* HIERARCHY LIST */
.hier-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.hier-item:last-child{border-bottom:none}
.hier-item:hover .hi-name{color:var(--accent)}
.hi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hi-name{font-size:12px;font-weight:500;flex:1}
.hi-state{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}
.hi-delta{font-size:11px;font-weight:600;min-width:50px;text-align:right}
.hi-arrow{color:var(--muted);font-size:14px}

/* ALERTS */
.alert-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-body{flex:1}
.alert-title{font-size:12px;font-weight:500;margin-bottom:2px}
.alert-sub{font-size:10px;color:var(--muted)}
.alert-time{font-size:10px;color:var(--muted);flex-shrink:0}

/* AI NARRATIVE */
.narrative-box{background:rgba(255,107,53,0.04);border:1px solid rgba(255,107,53,0.2);border-radius:14px;padding:1.1rem 1.2rem}
.narr-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.narr-icon{font-size:14px}
.narr-title{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:0.3px;text-transform:uppercase}
.narr-text{font-size:12px;color:var(--muted);line-height:1.7}
.narr-text strong{color:var(--text);font-weight:500}

/* CHART WRAP */
.chart-wrap{position:relative;height:180px;margin-top:8px}

/* IPO TABLE */
.ipo-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.ipo-row:last-child{border-bottom:none}
.ipo-sku{font-size:10px;color:var(--muted);font-family:monospace}
.ipo-name{font-size:12px;font-weight:500;flex:1}
.ipo-ipo{font-size:11px;font-weight:700;min-width:32px;text-align:right}
.ipo-bar-wrap{width:60px;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.ipo-bar-fill{height:100%;border-radius:3px}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:2px}
</style>
</head>

<!-- MAIN -->
<div class="main" id="mainContent">

<script>
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function setTheme(theme) {
  const safeTheme = theme === 'office' ? 'office' : 'executive';
  document.body.classList.toggle('theme-office', safeTheme === 'office');
  localStorage.setItem('rm-theme', safeTheme);
  document.querySelectorAll('input[name="rm-theme"]').forEach(input => {
    input.checked = input.value === safeTheme;
  });
}

function initTheme() {
  setTheme(localStorage.getItem('rm-theme') || 'executive');
}

function toggleThemeSettings() {
  document.getElementById('themeSettings')?.classList.toggle('open');
}

function toggleMobileMenu() {
  const isOpen = document.body.classList.toggle('mobile-menu-open');
  document.querySelector('.menu-toggle')?.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

function closeMobileMenu() {
  document.body.classList.remove('mobile-menu-open');
  document.querySelector('.menu-toggle')?.setAttribute('aria-expanded', 'false');
}

let currentLevel = 'holding';

function setLevel(level) {

  const navMap = {holding:0,sucursal:1,categoria:2,producto:3,cliente:4};
  document.querySelectorAll('.nav-item')[navMap[level]].classList.add('active');
  render();
}

function drillDown(name) {
  const next = levels[levels.indexOf(currentLevel)+1];

function renderChart() {
  const ctx = document.getElementById('trendChart');
  if(!ctx) return;

  const labels = Array.from({length:30},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-29+i);
    return d.toLocaleDateString('es-MX',{month:'short',day:'numeric'});
  }).filter((_,i)=>i%4===0||i===29);
  const idxs = Array.from({length:30},(_,i)=>i).filter(i=>i%4===0||i===29);

  const ventas = [88,91,87,93,95,89,92,96,94,97,91,88,90,93,98,95,99,97,101,98,102,99,104,101,105,103,107,105,109,108];
  const margen = [17.1,17.4,17.2,17.8,18.0,17.6,17.9,18.2,18.0,18.3,17.8,17.5,17.7,18.0,18.4,18.1,18.5,18.3,18.7,18.4,18.8,18.5,18.9,18.6,19.0,18.8,19.1,18.9,19.2,18.2];

  const filtV = idxs.map(i=>ventas[i]);
  const filtM = idxs.map(i=>parseFloat(margen[i].toFixed(1)));
  const filtL = idxs.map(i=>labels[idxs.indexOf(i)]);

  const leg = document.getElementById('legendArea');
  if(leg) leg.innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b35"></div>Ventas (índice base 100)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5b9cf6;border-radius:2px;border:2px dashed #5b9cf6;background:transparent"></div>Margen bruto %</div>
  `;

  chartInstance = new Chart(ctx, {
    type:'line',
    data:{
      labels: idxs.map(i=>{
        const d2=new Date();d2.setDate(d2.getDate()-29+i);
        return d2.toLocaleDateString('es-MX',{month:'short',day:'numeric'});
      }),
      datasets:[
        {label:'Ventas',data:filtV,borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,0.08)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#ff6b35',yAxisID:'y'},

        y1:{position:'right',ticks:{color:'#5b9cf6',font:{size:10}},grid:{display:false}},
      }
    }
  });
}
