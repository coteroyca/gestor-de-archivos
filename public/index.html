<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Archivos - RetailMind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            padding: 50px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .refresh-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            padding: 0 20px;
            gap: 5px;
        }

        .tab-button {
            padding: 15px 25px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            position: relative;
        }

        .tab-button:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-button.active {
            color: #667eea;
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        /* Content */
        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Bar */
        .stats-bar {
            background: #f0f0f0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        /* File Groups */
        .file-group {
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
        }

        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .group-header:hover {
            opacity: 0.95;
        }

        .group-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .group-count {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .group-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .file-list {
            padding: 20px;
            display: grid;
            gap: 10px;
            transition: all 0.3s;
        }

        .group-header.collapsed + .file-list {
            display: none;
        }

        .file-item {
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .file-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .file-icon {
            font-size: 1.3rem;
        }

        .file-name {
            font-weight: 500;
            color: #333;
            word-break: break-word;
        }

        .file-type {
            color: #999;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-view:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-download {
            background: #48bb78;
            color: white;
        }

        .btn-download:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .empty-folder {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.1rem;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 50px;
            color: #e53e3e;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            
            .tab-button {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            
            .tab-content {
                padding: 20px;
            }
            
            .file-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }
            
            .refresh-btn {
                position: static;
                margin-top: 15px;
                display: inline-block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <img src="/logos/logo-RetailMind-R-cuadrada.png" alt="RetailMind Logo" class="hero-logo">
            <h1>Gestor de Archivos</h1>
            <p>Administra y organiza todos tus documentos de manera eficiente</p>
            <button class="refresh-btn" onclick="refreshFiles()">🔄 Refrescar</button>
        </div>
        
        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando archivos...</p>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        async function loadFiles() {
            try {
                // Añadir timestamp para evitar caché
                const response = await fetch(`/api/tree.js?t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    currentData = data.folders;
                    renderApp(data.folders);
                    
                    // Mostrar mensaje de éxito con info
                    console.log(`✅ Cargadas ${data.totalFolders} carpetas dinámicamente`);
                } else {
                    showError(data.error || 'Error desconocido');
                }
            } catch (error) {
                console.error('Error:', error);
                showError(`No se pudieron cargar los archivos: ${error.message}`);
            }
        }

        function refreshFiles() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Refrescando archivos...</p>
                </div>
            `;
            loadFiles();
        }

        function showError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error">
                    <h3>⚠️ Error</h3>
                    <p>${message}</p>
                    <button onclick="refreshFiles()" class="btn btn-view" style="margin-top: 20px;">Reintentar</button>
                </div>
            `;
        }

        function renderApp(folders) {
            if (!folders || folders.length === 0) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h3>📁 No hay carpetas disponibles</h3>
                        <p>No se encontraron carpetas para mostrar.</p>
                        <p>Asegúrate de tener carpetas en el directorio /public</p>
                    </div>
                `;
                return;
            }

            // Calcular estadísticas totales
            const totalFiles = folders.reduce((sum, folder) => sum + (folder.files?.length || 0), 0);
            
            const app = document.getElementById('app');
            
            // Crear stats bar
            const statsHtml = `
                <div class="stats-bar">
                    <span>📁 ${folders.length} carpetas</span>
                    <span>📄 ${totalFiles} archivos</span>
                    <span>🔄 Actualizado: ${new Date().toLocaleTimeString()}</span>
                </div>
            `;
            
            // Crear tabs
            const tabsHtml = `
                ${statsHtml}
                <div class="tabs" id="tabs">
                    ${folders.map((folder, index) => `
                        <button class="tab-button ${index === 0 ? 'active' : ''}" data-tab="${index}">
                            ${folder.name.toUpperCase()} ${folder.fileCount ? `(${folder.fileCount})` : ''}
                        </button>
                    `).join('')}
                </div>
                <div id="tab-contents">
                    ${folders.map((folder, index) => `
                        <div class="tab-content ${index === 0 ? 'active' : ''}" data-tab-content="${index}">
                            ${renderFolderContent(folder)}
                        </div>
                    `).join('')}
                </div>
            `;
            
            app.innerHTML = tabsHtml;
            
            // Agregar event listeners para las tabs
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', () => {
                    const tabIndex = button.dataset.tab;
                    switchTab(tabIndex);
                });
            });
            
            // Agregar event listeners para los desplegables
            document.querySelectorAll('.group-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.classList.toggle('collapsed');
                });
            });
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab-button[data-tab="${tabIndex}"]`).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelector(`.tab-content[data-tab-content="${tabIndex}"]`).classList.add('active');
        }

        function renderFolderContent(folder) {
            if (!folder.files || folder.files.length === 0) {
                return `
                    <div class="empty-folder">
                        📂 Esta carpeta está vacía
                    </div>
                `;
            }
            
            // Agrupar archivos por tipo
            const filesByType = {};
            folder.files.forEach(file => {
                if (!filesByType[file.type]) {
                    filesByType[file.type] = [];
                }
                filesByType[file.type].push(file);
            });
            
            // Ordenar tipos alfabéticamente
            const sortedTypes = Object.keys(filesByType).sort();
            
            return sortedTypes.map(type => {
                const files = filesByType[type];
                return `
                    <div class="file-group">
                        <div class="group-header">
                            <div>
                                <span class="group-title">📄 ${type.toUpperCase()}</span>
                                <span class="group-count">${files.length} archivo${files.length !== 1 ? 's' : ''}</span>
                            </div>
                            <div class="toggle-icon">▼</div>
                        </div>
                        <div class="file-list">
                            ${files.map(file => renderFileItem(file)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderFileItem(file) {
            const isHtml = file.type === 'html';
            const actionText = isHtml ? 'Ver' : 'Descargar';
            const actionClass = isHtml ? 'btn-view' : 'btn-download';
            
            let icon = '📄';
            if (file.type === 'pdf') icon = '📑';
            else if (['jpg', 'png', 'gif', 'jpeg', 'webp'].includes(file.type)) icon = '🖼️';
            else if (['mp4', 'mov', 'avi', 'mkv'].includes(file.type)) icon = '🎥';
            else if (['mp3', 'wav', 'ogg'].includes(file.type)) icon = '🎵';
            else if (file.type === 'html') icon = '🌐';
            else if (file.type === 'css') icon = '🎨';
            else if (file.type === 'js') icon = '⚡';
            else if (file.type === 'json') icon = '🔧';
            else if (file.type === 'txt') icon = '📝';
            else if (file.type === 'doc' || file.type === 'docx') icon = '📘';
            else if (file.type === 'xls' || file.type === 'xlsx') icon = '📊';
            
            return `
                <div class="file-item">
                    <div class="file-info">
                        <span class="file-icon">${icon}</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-type">.${file.type}</span>
                    </div>
                    <div class="file-actions">
                        <a href="${file.url}" class="btn ${actionClass}" ${!isHtml ? 'download' : ''} target="${isHtml ? '_blank' : ''}">
                            ${actionText}
                        </a>
                    </div>
                </div>
            `;
        }

        // Inicializar
        loadFiles();
    </script>
</body>
</html>
