<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Archivos - RetailMind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        /* Botón Hamburguesa */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            z-index: 100;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .menu-btn span {
            width: 22px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* Menú Lateral */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            transition: left 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .side-menu.open {
            left: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 999;
        }

        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .menu-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .menu-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            padding: 10px;
            margin-bottom: 15px;
        }

        .menu-header h3 {
            color: white;
            font-size: 1.2rem;
        }

        .menu-items {
            padding: 20px;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 100%;
            text-align: left;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: rgba(102, 126, 234, 0.8);
            border-left: 3px solid white;
        }

        .menu-item-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .close-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .hero-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .refresh-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Tabs (Subcarpetas) */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            padding: 0 20px;
            gap: 5px;
        }

        .tab-button {
            padding: 15px 25px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            position: relative;
        }

        .tab-button:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-button.active {
            color: #667eea;
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        /* Content */
        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Bar */
        .stats-bar {
            background: #f0f0f0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .current-folder {
            font-weight: 600;
            color: #667eea;
        }

        /* File Groups */
        .file-group {
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
        }

        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .group-header:hover {
            opacity: 0.95;
        }

        .group-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .group-count {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .group-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .file-list {
            padding: 20px;
            display: grid;
            gap: 10px;
            transition: all 0.3s;
        }

        .group-header.collapsed + .file-list {
            display: none;
        }

        .file-item {
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .file-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .file-icon {
            font-size: 1.3rem;
        }

        .file-name {
            font-weight: 500;
            color: #333;
            word-break: break-word;
        }

        .file-type {
            color: #999;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-view:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-download {
            background: #48bb78;
            color: white;
        }

        .btn-download:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .empty-folder, .no-subfolders {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.1rem;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 50px;
            color: #e53e3e;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            
            .hero p {
                font-size: 0.9rem;
            }
            
            .tab-button {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
            
            .tab-content {
                padding: 20px;
            }
            
            .file-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }
            
            .refresh-btn {
                position: static;
                margin-top: 15px;
                display: inline-block;
            }
            
            .side-menu {
                width: 85%;
                left: -85%;
            }
            
            .stats-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
/* Estilo especial para la pestaña Raíz */
.tab-button[data-tab] {
    position: relative;
}

/* Puedes agregar un ícono especial si la pestaña contiene "Raíz" */
.tab-button:contains("📁 Raíz")::before {
    content: "🏠 ";
}
    </style>
</head>
<body>
    <!-- Menú Hamburguesa -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="side-menu" id="sideMenu">
        <button class="close-menu" onclick="closeMenu()">✕</button>
        <div class="menu-header">
            <img src="/assets/logos/logo-RetailMind-R-cuadrada.png" alt="RetailMind Logo">
            <h3>Gestor de Archivos</h3>
        </div>
        <div class="menu-items" id="menuItems">
            <div class="loading">Cargando carpetas...</div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <button class="menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <img src="/logos/logo-RetailMind-R-cuadrada.png" alt="RetailMind Logo" class="hero-logo">
            <h1>Gestor de Archivos</h1>
            <p>Administra y organiza todos tus documentos de manera eficiente</p>
            <button class="refresh-btn" onclick="refreshFiles()">🔄 Refrescar</button>
        </div>
        
        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando archivos...</p>
            </div>
        </div>
    </div>

    <script>
        let fullData = null; // Datos completos de todas las carpetas
        let currentMainFolder = null; // Carpeta principal seleccionada

        async function loadFiles() {
            try {
                const response = await fetch(`/api/tree.js?t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    fullData = data.folders;
                    buildMenu(fullData);
                    
                    // Seleccionar la primera carpeta por defecto
                    if (fullData.length > 0 && !currentMainFolder) {
                        currentMainFolder = fullData[0].name;
                        renderSubfolders(currentMainFolder);
                    }
                } else {
                    showError(data.error || 'Error desconocido');
                }
            } catch (error) {
                console.error('Error:', error);
                showError(`No se pudieron cargar los archivos: ${error.message}`);
            }
        }

        function buildMenu(folders) {
            const menuItems = document.getElementById('menuItems');
            
            if (!folders || folders.length === 0) {
                menuItems.innerHTML = '<div class="empty-folder" style="color:white;">No hay carpetas disponibles</div>';
                return;
            }
            
            menuItems.innerHTML = folders.map(folder => `
                <button class="menu-item ${currentMainFolder === folder.name ? 'active' : ''}" onclick="selectMainFolder('${folder.name}')">
                    <span>📁 ${folder.name}</span>
                    <span class="menu-item-count">${folder.subfolders?.length || 0}</span>
                </button>
            `).join('');
        }

        function selectMainFolder(folderName) {
            currentMainFolder = folderName;
            buildMenu(fullData); // Refrescar menu para mostrar active
            renderSubfolders(folderName);
            closeMenu(); // Cerrar menu después de seleccionar
        }

function renderSubfolders(mainFolderName) {
    const mainFolder = fullData.find(f => f.name === mainFolderName);
    
    if (!mainFolder) {
        document.getElementById('app').innerHTML = `
            <div class="error">
                <h3>⚠️ Error</h3>
                <p>Carpeta no encontrada</p>
            </div>
        `;
        return;
    }
    
    const subfolders = mainFolder.subfolders || [];
    
    if (subfolders.length === 0) {
        document.getElementById('app').innerHTML = `
            <div class="stats-bar">
                <span>📁 Carpeta actual: <span class="current-folder">${mainFolderName}</span></span>
                <span>📄 Sin contenido</span>
            </div>
            <div class="no-subfolders">
                📂 No hay archivos o subcarpetas en ${mainFolderName}
                <p style="font-size: 0.9rem; margin-top: 10px;">Agrega archivos en /public/${mainFolderName} o crea subcarpetas</p>
            </div>
        `;
        return;
    }
    
    // Calcular estadísticas
    const totalFiles = subfolders.reduce((sum, sub) => sum + (sub.files?.length || 0), 0);
    const rootFilesCount = mainFolder.rootFilesCount || 0;
    
    const app = document.getElementById('app');
    
    const statsHtml = `
        <div class="stats-bar">
            <span>📁 Carpeta actual: <span class="current-folder">${mainFolderName}</span></span>
            <span>📂 ${subfolders.length} seccion${subfolders.length !== 1 ? 'es' : ''}</span>
            <span>📄 ${totalFiles} archivo${totalFiles !== 1 ? 's' : ''}</span>
            ${rootFilesCount > 0 ? `<span>📌 ${rootFilesCount} en raíz</span>` : ''}
            <span>🔄 Actualizado: ${new Date().toLocaleTimeString()}</span>
        </div>
    `;
    
    // Crear tabs para las subcarpetas
    const tabsHtml = `
        ${statsHtml}
        <div class="tabs" id="tabs">
            ${subfolders.map((subfolder, index) => `
                <button class="tab-button ${index === 0 ? 'active' : ''}" data-tab="${index}">
                    ${subfolder.name} ${subfolder.fileCount ? `(${subfolder.fileCount})` : ''}
                </button>
            `).join('')}
        </div>
        <div id="tab-contents">
            ${subfolders.map((subfolder, index) => `
                <div class="tab-content ${index === 0 ? 'active' : ''}" data-tab-content="${index}">
                    ${renderFolderContent(subfolder)}
                </div>
            `).join('')}
        </div>
    `;
    
    app.innerHTML = tabsHtml;
    
    // Agregar event listeners para las tabs
    document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
            const tabIndex = button.dataset.tab;
            switchTab(tabIndex);
        });
    });
    
    // Agregar event listeners para los desplegables
    document.querySelectorAll('.group-header').forEach(header => {
        header.addEventListener('click', () => {
            header.classList.toggle('collapsed');
        });
    });
}
        
        function switchTab(tabIndex) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab-button[data-tab="${tabIndex}"]`).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelector(`.tab-content[data-tab-content="${tabIndex}"]`).classList.add('active');
        }

function renderFolderContent(folder) {
    if (!folder.files || folder.files.length === 0) {
        return `
            <div class="empty-folder">
                📂 Esta carpeta está vacía
            </div>
        `;
    }
    
    // Agrupar archivos por tipo
    const filesByType = {};
    folder.files.forEach(file => {
        if (!filesByType[file.type]) {
            filesByType[file.type] = [];
        }
        filesByType[file.type].push(file);
    });
    
    // Ordenar tipos alfabéticamente
    const sortedTypes = Object.keys(filesByType).sort();
    
    return sortedTypes.map(type => {
        const files = filesByType[type];
        return `
            <div class="file-group">
                <div class="group-header">
                    <div>
                        <span class="group-title">📄 ${type.toUpperCase()}</span>
                        <span class="group-count">${files.length} archivo${files.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="file-list">
                    ${files.map(file => renderFileItem(file)).join('')}
                </div>
            </div>
        `;
    }).join('');
}
        function renderFileItem(file) {
            const isHtml = file.type === 'html';
            const actionText = isHtml ? 'Ver' : 'Descargar';
            const actionClass = isHtml ? 'btn-view' : 'btn-download';
            
            let icon = '📄';
            if (file.type === 'pdf') icon = '📑';
            else if (['jpg', 'png', 'gif', 'jpeg', 'webp'].includes(file.type)) icon = '🖼️';
            else if (['mp4', 'mov', 'avi', 'mkv'].includes(file.type)) icon = '🎥';
            else if (['mp3', 'wav', 'ogg'].includes(file.type)) icon = '🎵';
            else if (file.type === 'html') icon = '🌐';
            else if (file.type === 'css') icon = '🎨';
            else if (file.type === 'js') icon = '⚡';
            else if (file.type === 'json') icon = '🔧';
            else if (file.type === 'txt') icon = '📝';
            else if (file.type === 'doc' || file.type === 'docx') icon = '📘';
            else if (file.type === 'xls' || file.type === 'xlsx') icon = '📊';
            
            return `
                <div class="file-item">
                    <div class="file-info">
                        <span class="file-icon">${icon}</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-type">.${file.type}</span>
                    </div>
                    <div class="file-actions">
                        <a href="${file.url}" class="btn ${actionClass}" ${!isHtml ? 'download' : ''} target="${isHtml ? '_blank' : ''}">
                            ${actionText}
                        </a>
                    </div>
                </div>
            `;
        }

        function refreshFiles() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Refrescando archivos...</p>
                </div>
            `;
            loadFiles();
        }

        function showError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error">
                    <h3>⚠️ Error</h3>
                    <p>${message}</p>
                    <button onclick="refreshFiles()" class="btn btn-view" style="margin-top: 20px;">Reintentar</button>
                </div>
            `;
        }

        // Funciones del menú
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function closeMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.remove('open');
            overlay.classList.remove('open');
        }

        // Cerrar menú al hacer clic en overlay
        document.getElementById('menuOverlay').addEventListener('click', closeMenu);

        // Inicializar
        loadFiles();
    </script>
</body>
</html>
